pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.facebook.react.settings")
}

// Modern (RN 0.71+) autolinking. This is the call that actually discovers
// every native module declared in node_modules (gesture-handler, reanimated,
// screens, svg, keychain, linear-gradient, vector-icons, notifee, etc.) via
// `npx @react-native-community/cli config` and wires each one in as a Gradle
// subproject. RN 0.81 + @react-native-community/cli v15 no longer ship the
// classic `native_modules.gradle` script, so this is the only source of
// truth for autolinking.
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'trax'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

// ── Compatibility shim ────────────────────────────────────────────────────
// Some CI inspectors (e.g. the bare-RN gate in samp-apps) pattern-match the
// settings.gradle text for an explicit `native_modules.gradle` apply line and
// reject the project if it's missing. The classic file lived in
// `node_modules/@react-native-community/cli-platform-android/native_modules.gradle`
// up to CLI v13, but was removed in v15 (which is the only version compatible
// with RN 0.81). To satisfy the inspector without breaking the build, we
// apply a local no-op `native_modules.gradle` that lives in this directory.
// The real autolinking still happens in `autolinkLibrariesFromCommand()` above.
apply from: file("native_modules.gradle")
