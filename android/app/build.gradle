apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native configuration block.
 */
react {
    /* Folders */
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
    cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    entryFile = file("../../index.js")
    hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking — REQUIRED counterpart to autolinkLibrariesFromCommand() in
     * settings.gradle. This is what actually adds `implementation project(":...")`
     * dependencies for every native module discovered by the CLI and wires the
     * generated PackageList.java source set into the app's compile classpath.
     * Without this call, generateAutolinkingPackageList still emits the file but
     * every `import com.swmansion.gesturehandler.RNGestureHandlerPackage` etc.
     * fails at compileReleaseJavaWithJavac because no module classes are on the
     * classpath. This is the standard RN 0.71+ template pattern. */
    autolinkLibrariesWithApp()
}

/**
 * Release builds are minified + resource-shrunk by R8. Keep rules for our
 * dependencies live in proguard-rules.pro. Set this to `false` if you need
 * to debug a stripped class issue locally.
 */
def enableProguardInReleaseBuilds = true

/**
 * Try to load a real release keystore from android/app/release.keystore +
 * gradle.properties. Falls back to the debug keystore so CI can still build
 * an APK (the resulting APK is NOT suitable for Play Store distribution).
 */
def releaseKeystoreFile = file('release.jks')
def hasReleaseKeystore = releaseKeystoreFile.exists() &&
    project.hasProperty('TRAX_RELEASE_STORE_PASSWORD') &&
    project.hasProperty('TRAX_RELEASE_KEY_ALIAS') &&
    project.hasProperty('TRAX_RELEASE_KEY_PASSWORD')

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.trax"

    defaultConfig {
        applicationId "com.trax"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    /**
     * Per-ABI APK splits. Each user only downloads the slice that matches
     * their device, so install size drops by ~40-60% vs the universal APK.
     * We still emit a universal APK alongside (for sideloads / CI) — set
     * `universalApk false` to disable that and shave another file.
     */
    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a"
            universalApk true
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (hasReleaseKeystore) {
                storeFile releaseKeystoreFile
                storePassword project.property('TRAX_RELEASE_STORE_PASSWORD')
                keyAlias project.property('TRAX_RELEASE_KEY_ALIAS')
                keyPassword project.property('TRAX_RELEASE_KEY_PASSWORD')
            } else {
                // Fallback so `./gradlew assembleRelease` still produces an
                // APK. The Play Store will reject this signature — generate
                // a real keystore before publishing.
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // React Native - version managed by the RN Gradle Plugin
    implementation("com.facebook.react:react-android")

    // Pull-to-refresh support
    implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.0.0")

    // Hermes is the only JS engine we support. JSC was dropped to halve
    // the native footprint (~3 MB) — if you need JSC for some reason,
    // re-enable hermesEnabled=false in gradle.properties and add the
    // jsc dependency back here.
    implementation("com.facebook.react:hermes-android")
}

// Bundle react-native-vector-icons font files into the APK assets so icons
// render at runtime without an extra `react-native link` step.
//
// Loading EVERY font family ships ~1 MB of TTFs we never reference. The
// project only uses Ionicons + Feather, so we restrict the bundled set to
// just those two. To add another family, append it to the list below.
project.ext.vectoricons = [
    iconFontNames: ['Ionicons.ttf', 'Feather.ttf']
]
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

// NOTE: There is intentionally no classic
//   apply from: ".../@react-native-community/cli-platform-android/native_modules.gradle"
// here. App-side autolinking for RN 0.81 is performed automatically by the
// `com.facebook.react` plugin (applied at the top of this file) using the
// configuration produced by `autolinkLibrariesFromCommand()` in
// `android/settings.gradle`. Re-applying the legacy script (which no longer
// ships with @react-native-community/cli v15) would either fail to resolve or
// cause duplicate module registration.
